name: Deploy

on:
  schedule:
    - cron: '0 8,20 * * *' # 10:00 and 22:00 Egypt time (UTC+2)
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Upload Worker secrets
        run: |
          echo "${{ secrets.TMDB_API_KEY }}" | pnpm wrangler secret put TMDB_API_KEY
          echo "${{ secrets.TMDB_HEADER_KEY }}" | pnpm wrangler secret put TMDB_HEADER_KEY
          echo "${{ secrets.GOOGLE_GTM_ID }}" | pnpm wrangler secret put GOOGLE_GTM_ID
          echo "${{ secrets.GOOGLE_MEASUREMENT_ID }}" | pnpm wrangler secret put GOOGLE_MEASUREMENT_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_HEADER_KEY: ${{ secrets.TMDB_HEADER_KEY }}
          NEXT_PUBLIC_TMDB_BASEURL: ${{ secrets.NEXT_PUBLIC_TMDB_BASEURL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_STREAMING_MOVIES_API_URL: ${{ secrets.NEXT_PUBLIC_STREAMING_MOVIES_API_URL }}
          NEXT_PUBLIC_SEARCH_ACTOR_GOOGLE: ${{ secrets.NEXT_PUBLIC_SEARCH_ACTOR_GOOGLE }}
          NEXT_PUBLIC_IMAGE_CACHE_HOST_URL: ${{ secrets.NEXT_PUBLIC_IMAGE_CACHE_HOST_URL }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
